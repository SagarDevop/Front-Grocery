<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    
    <!-- SEO Meta -->
    <title>GreenCart - Fresh Grocery Delivery | Organic Produce in 30 Minutes</title>
    <meta name="description" content="GreenCart delivers premium organic groceries to your doorstep in 30 minutes. Shop fresh fruits, vegetables, dairy products, bakery items & more at the best prices." />
    <meta name="keywords" content="grocery delivery, organic vegetables, fresh fruits, online grocery, GreenCart" />
    <meta name="author" content="GreenCart" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="GreenCart - Fresh Grocery Delivery" />
    <meta property="og:description" content="Premium organic groceries delivered in 30 minutes. Shop now!" />
    <meta property="og:image" content="/GreenCart_logo.png" />
    <meta property="og:type" content="website" />
    
    <!-- PWA Meta -->
    <link rel="icon" type="image/png" href="/GreenCart_logo.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GreenCart" />
    
    <!-- Splash Screens for iOS -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://grocery-store-754w.onrender.com" />
  </head>

      </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
